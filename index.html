<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UConn Watch Club</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F5F0E8;
    --warm-white: #FAF8F4;
    --dark: #1A1714;
    --mid: #3D3730;
    --gold: #B8965A;
    --gold-light: #D4B07A;
    --muted: #8C7B6B;
    --border: rgba(184,150,90,0.25);
  }

  html { scroll-behavior: smooth; }

  body {
    background-color: var(--dark);
    color: var(--cream);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
    position: relative;
  }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.1s forwards;
  }

  .monogram {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.25rem;
    position: relative;
  }

  .monogram::before {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    border: 0.5px solid rgba(184,150,90,0.3);
  }

  .monogram span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 2px;
  }

  .club-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--cream);
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1.2;
  }

  .club-sub {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 8px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 1.5rem auto;
    max-width: 200px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--border);
  }

  .divider-diamond {
    width: 5px;
    height: 5px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-style: italic;
    color: var(--muted);
    text-align: center;
